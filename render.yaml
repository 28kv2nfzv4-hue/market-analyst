services:
  - type: web
    name: market-analyst-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://28kv2nfzv4-hue.github.io
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: DIGEST_API_SECRET
        sync: false
      - key: BROKER_SYNC_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
    # DATABASE_URL should point at an external Postgres database (e.g. a
    # free Neon project) for persistence across redeploys. If unset, falls
    # back to a local sqlite file on ephemeral container storage, which
    # resets on every deploy.
