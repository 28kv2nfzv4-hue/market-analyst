services:
  - type: web
    name: market-analyst-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://28kv2nfzv4-hue.github.io
    # Free plan has no persistent disk, so trades.db lives on ephemeral
    # container storage and resets on every deploy. Add a `disk:` block
    # (requires a paid instance type) for real persistence.
