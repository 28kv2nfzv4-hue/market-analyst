name: Daily Market Digest

on:
  schedule:
    - cron: '0 13 * * 1-5' # 13:00 UTC = 8:00am CDT (UTC-5), Mon-Fri
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: news_bot
        run: pip install -r requirements.txt

      - name: Run daily digest
        working-directory: news_bot
        run: python digest.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BACKEND_API_URL: ${{ vars.VITE_API_URL }}
          DIGEST_API_SECRET: ${{ secrets.DIGEST_API_SECRET }}
