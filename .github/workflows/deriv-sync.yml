name: Deriv Broker Sync

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: broker_sync
        run: pip install -r requirements.txt

      - name: Run Deriv sync
        working-directory: broker_sync
        run: python deriv_sync.py
        env:
          DERIV_API_TOKEN: ${{ secrets.DERIV_API_TOKEN }}
          DERIV_APP_ID: ${{ secrets.DERIV_APP_ID }}
          DERIV_LOGINID: ${{ vars.DERIV_LOGINID }}
          BACKEND_API_URL: ${{ vars.VITE_API_URL }}
          BROKER_SYNC_SECRET: ${{ secrets.BROKER_SYNC_SECRET }}
